           <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÓC TÂM SỰ - LẮNG NGHE & THẤU HIỂU</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top right, #2c3e50, #000000);
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            max-width: 850px;
            margin: auto;
            text-align: center;
        }
        h1 { color: #00d2ff; margin-bottom: 10px; font-size: 32px; text-transform: uppercase; letter-spacing: 1px; }
        p.subtitle { color: #ff9a9e; font-size: 18px; margin-bottom: 30px; font-weight: 600; }
        
        .form-container { 
            width: 100%; 
            border-radius: 15px; 
            overflow: hidden; 
            background: white; 
            margin-bottom: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Khu vực nút tương tác trực quan */
        .action-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .btn-link {
            display: inline-block;
            padding: 18px 35px;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            min-width: 280px;
        }
        .btn-bot {
            background: linear-gradient(45deg, #00d2ff, #0072ff);
        }
        .btn-bot:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); }
        
        .btn-quiz {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            color: #333;
        }
        .btn-quiz:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Góc Tâm Sự</h1>
        <p class="subtitle">✨ LẮNG NGHE & THẤU HIỂU ✨</p>
        
        <h2>💌 GỬI CHIA SẺ ẨN DANH TẠI ĐÂY</h2>
        <div class="form-container">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdOkFFUlrbiqhfrzr1BYzDW6wDcleTmh5ulQeHGzSvciE8E8A/viewform?embedded=true" width="100%" height="650" frameborder="0"></iframe>
        </div>

        <!-- CẬP NHẬT HAI NÚT BẤM TIỆN ÍCH SONG SONG -->
        <div class="action-area">
            <!-- Nút mở cổng trò chuyện AI an toàn tuyệt đối -->
            <a href="https://www.coze.com/store/bot/7661818497130987573" target="_blank" class="btn-link btn-bot">🤖 TRÒ CHUYỆN CÙNG TRỢ LÝ TÂM LÝ AI</a>
            
            <!-- Nút trắc nghiệm chuẩn tên yêu cầu -->
            <a href="https://www.flexiquiz.com/SC/N/28c896b2-0121-4dc0-a3aa-f3eb8b405f8e" target="_blank" class="btn-link btn-quiz">🚀 BẮT ĐẦU TRẮC NGHIỆM ĐÁNH GIÁ TÂM LÝ NHÉ</a>
        </div>
    </div>

</body>
</html>
