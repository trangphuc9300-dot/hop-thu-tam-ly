<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÓC TÂM SỰ - LẮNG NGHE & THẤU HIỂU</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top right, #2c3e50, #000000);
            color: #ffffff;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1250px;
            margin: auto;
            text-align: center;
        }
        h1 { color: #00d2ff; margin-bottom: 10px; font-size: 32px; text-transform: uppercase; letter-spacing: 1px; }
        p.subtitle { color: #ff9a9e; font-size: 18px; margin-bottom: 30px; font-weight: 600; }
        
        .workspace {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .section-box {
            flex: 1;
            min-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
        }
        .section-box h2 { font-size: 20px; margin-top: 0; margin-bottom: 20px; font-weight: 700; }
        .box-chat { color: #00d2ff; }
        .box-form { color: #ff9a9e; }
        
        .iframe-container { 
            width: 100%; 
            height: 620px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #ffffff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .quiz-area {
            margin-top: 40px;
        }
        .btn-quiz {
            display: inline-block;
            padding: 18px 45px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }
        .btn-quiz:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Góc Tâm Sự</h1>
        <p class="subtitle">✨ LẮNG NGHE & THẤU HIỂU ✨</p>
        
        <div class="workspace">
            <!-- CỘT 1: TRÒ CHUYỆN VỚI AI QUA SDK ĐÃ KÍCH HOẠT -->
            <div class="section-box">
                <h2 class="box-chat">🤖 TRÒ CHUYỆN CÙNG TRỢ LÝ TÂM LÝ VÀ AI</h2>
                <div class="iframe-container">
                    <iframe src="https://www.coze.com/chat/7661818497130987573" width="100%" height="100%" frameborder="0" allow="microphone; camera"></iframe>
                </div>
            </div>
            
            <!-- CỘT 2: GỬI FORM TÂM SỰ -->
            <div class="section-box">
                <h2 class="box-form">💌 GỬI CHIA SẺ ẨN DANH TẠI ĐÂY</h2>
                <div class="iframe-container">
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdOkFFUlrbiqhfrzr1BYzDW6wDcleTmh5ulQeHGzSvciE8E8A/viewform?embedded=true" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </div>
        </div>

        <!-- NÚT BẤM TRẮC NGHIỆM ĐÃ ĐỔI TÊN CHUẨN -->
        <div class="quiz-area">
            <a href="https://www.flexiquiz.com/SC/N/28c896b2-0121-4dc0-a3aa-f3eb8b405f8e" target="_blank" class="btn-quiz">🚀 BẮT ĐẦU TRẮC NGHIỆM ĐÁNH GIÁ TÂM LÝ NHÉ</a>
        </div>
    </div>

</body>
</html>
